; lumary-zigbee/platformio.ini
[env:esp32h2]
platform = espressif32
platform_packages =
  framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#3.1.3
board = esp32h2
framework = arduino
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
build_flags =
  -DCORE_DEBUG_LEVEL=3
  -DZIGBEE_MODE_ED
